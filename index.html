<!DOCTYPE html>
<html>
<head>
    <title>WebGIS Prabumulih</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <style>
        #map {
            height: 100vh;
            width: 100%;
        }
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
    // Membuat peta
    var map = L.map('map').setView([-3.45, 104.23], 12);

    // Menampilkan peta OpenStreetMap
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: 'OpenStreetMap'
    }).addTo(map);

    // Menambahkan titik koperasi
    L.marker([-3.45, 104.23])
        .addTo(map)
        .bindPopup('Lokasi Gerai Koperasi')
        .openPopup();
</script>

</body>
</html>
